name: try-auto-fix

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  try-fix:
    # This prevents the action from running on its own auto-fix branches
    if: startsWith(github.head_ref, 'auto-fix/') == false && startsWith(github.ref_name, 'auto-fix/') == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy,rustfmt
          override: true

      - name: Cache cargo registry & target
        continue-on-error: true
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run initial build & tests
        continue-on-error: true
        run: |
          cargo test --workspace

      - name: Try cargo fix (compiler fixes)
        continue-on-error: true
        run: |
          cargo fix --workspace --allow-dirty --allow-staged || true

      - name: Record files changed by cargo fix
        id: cargo_fix_changes
        shell: bash
        run: |
          git diff --name-only > /tmp/cargo_fix_files.txt || true
          if [ -s /tmp/cargo_fix_files.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Try clippy auto-fixes
        continue-on-error: true
        run: |
          cargo clippy --all-targets --all-features --workspace --fix --allow-dirty --allow-staged || true

      - name: Run rustfmt
        continue-on-error: true
        run: |
          cargo fmt --all

      - name: Detect files changed by clippy/fmt that cargo fix did not touch
        id: detect_changes
        shell: bash
        run: |
          git diff --name-only > /tmp/final_files.txt || true

          if [ ! -s /tmp/final_files.txt ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -s /tmp/cargo_fix_files.txt ]; then
            # cargo fix touched nothing, so any final change is from clippy/fmt
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if comm -23 <(sort /tmp/final_files.txt) <(sort /tmp/cargo_fix_files.txt) | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-run tests
        continue-on-error: true
        run: |
          cargo test --workspace

      - name: Create branch & PR if clippy/fmt changed files cargo fix did not touch
        if: steps.detect_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[auto-fix] apply cargo fix / clippy fixes"
          base: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          branch: auto-fix/${{ github.run_id }}
          title: "[auto-fix] Attempt fixes from cargo/clippy"
          body: |
            This PR contains automatic fixes from cargo fix / clippy --fix / rustfmt applied by CI.
            Run tests and review before merging.
          labels: automated, auto-fix
