name: AI Review (OpenRouter - minimal)

on:
  workflow_dispatch:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # checkout the PR HEAD (from the fork) if needed
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: AidentErfurt/bc-ai-reviewer@baaaaee45047a32f10d2a3fe544a3594b3853271 # main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PROVIDER: openrouter
          AI_MODEL: qwen/qwen3-235b-a22b:free
          AI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INCLUDE_PATTERNS: "*.toml,*.lock,**/*.rs,Cargo.*"
